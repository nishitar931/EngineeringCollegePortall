<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pragati Engineering College Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video autoplay muted loop id="bgVideo">
    <source src="background.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>

  <style>
    /* CSS for Video Background and Base */
    #bgVideo {
        position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -101;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
    }

    /* --- CRITICAL FIX: HEADER STYLES --- */
    #portalHeader {
        /* CHANGED: Header background is now black */
        background-color: rgba(0, 0, 0, 0.95);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        padding: 15px 30px;
        z-index: 100;
        
        display: flex; 
        justify-content: space-between;
        align-items: center;
        width: 100%; /* Ensure full width */
    }
    .header-logo {
        font-weight: bold;
        /* CHANGED: Logo text is white against the black background */
        color: #ffffff; 
        font-size: 1.2em;
        flex-shrink: 0; 
    }
    nav {
        display: flex; 
        align-items: center;
        flex-grow: 1; 
        justify-content: flex-end; 
    }
    .nav-btn {
        text-decoration: none;
        /* CHANGED: Default link text is light gray against black background */
        color: #ddd; 
        
        /* ADJUSTED: Reduced margin to pull links closer together */
        margin-left: 10px; 
        
        padding: 8px 12px;
        border-radius: 6px;
        transition: background-color 0.2s, color 0.2s;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 1em;
    }
    .nav-btn:hover {
        background-color: rgba(255, 255, 255, 0.1); /* Subtle hover effect */
        color: white;
    }
    .active-nav {
        background-color: #007bff; /* Keeps the active indicator blue */
        color: white !important;
    }
    /* --- Content Sections --- */
    .content-section {
        padding: 50px 20px;
        color: white;
        text-align: center;
    }
  </style>

  <header id="portalHeader">
    <div class="header-logo">PRAGATI </div>
    <nav>
        <button type="button" onclick="showSection('home')" class="nav-btn active-nav">Home</button>
        
        <a href="login.html" class="nav-btn">Login/Signup</a>
        
        <a href="rank.html" class="nav-btn">KCET </a>
        <a href="rank1.html" class="nav-btn">COMEDK</a>
        
        <a href="private.html" class="nav-btn">Private Exams</a>
    </nav>
  </header>

  <section id="homeSection" class="content-section active-section">
    <div class="home-content">
      <h1>Welcome to Pragati Engineering Colleges Portal</h1>
      <p>Your gateway to academic excellence and innovation.</p>
      <p>Use the links above to access the portal or the specific exam finder tools.</p>
    </div>
  </section>

  <script>
    // Handles active section/button display on the landing page
    function showSection(sectionId) {
      const sections = document.querySelectorAll('.content-section');
      const navButtons = document.querySelectorAll('.nav-btn');
      
      sections.forEach(section => {
        if (section.id === sectionId + 'Section') {
          section.classList.add('active-section');
          section.classList.remove('inactive-section');
        } else {
          section.classList.add('inactive-section');
          section.classList.remove('active-section');
        }
      });

      // Update active nav button: Sets 'Home' button as active
      navButtons.forEach(btn => {
        if (btn.tagName === 'BUTTON' && btn.getAttribute('onclick').includes(sectionId)) {
          btn.classList.add('active-nav');
        } else {
          btn.classList.remove('active-nav');
        }
        // Ensure link buttons (A tags) are marked inactive when 'Home' is selected
        if (btn.tagName === 'A') {
             btn.classList.remove('active-nav');
        }
      });
    }

    // Initial load
    showSection('home');
  </script>
</body>
</html>
